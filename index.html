<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>موقع نورس</title>
<style>
body{background:#111;color:white;text-align:center;font-family:Arial;padding:20px}
img{border-radius:50%;width:150px;height:150px;object-fit:cover;margin:20px}
img:hover{transform:scale(1.1);box-shadow:0 0 15px red;transition:0.3s}
.galery img{width:30%;height:200px;border-radius:10px;margin:5px}
</style>
</head>
<body>
<h1>اهلا بيكم في موقعي 🔥</h1>
<h2>نورس</h2>
<p>من بنغازي 🇱🇾 <br> نتعلم برمجة ونحب التكنولوجيا</p>
<img src="https://i.ibb.co/rG3vSzcD/image.jpg">
<h3>اعمالي</h3>
<div class="galery">
<img src="https://i.ibb.co/DHgK2qVv/Screenshot-Facebook.jpg">
<img src="https://i.ibb.co/tdm7ZjG/Screenshot-Gallery.jpg">
<img src="https://i.ibb.co/rG3vSzcD/image.jpg">
</div>
  <!-- زر واتساب نورس -->
<a href="https://wa.me/218910195360?text=مرحبا%20موقع%20نورس%20عندي%20استفسار" 
   target="_blank" 
   style="position:fixed; bottom:20px; right:20px; background:#25D366; 
   color:white; width:60px; height:60px; border-radius:50%; 
   display:flex; align-items:center; justify-content:center; 
   font-size:35px; text-decoration:none; box-shadow:0 4px 10px rgba(0,0,0,0.3); 
   z-index:999;">
   💬
</a>
  <!-- صندوق الشات -->
<div id="chatbox" style="position:fixed; bottom:80px; right:20px; width:300px; background:white; border-radius:15px; box-shadow:0 4px 20px rgba(0,0,0,0.2); display:none; flex-direction:column; z-index:9999;">
  <div style="background:#25D366; color:white; padding:10px; border-radius:15px 15px 0 0; font-weight:bold;">مساعد نورس 🤖</div>
  <div id="chatMessages" style="height:250px; overflow-y:auto; padding:10px; font-size:14px; color:#111;"></div>
  <div style="display:flex; border-top:1px solid #eee;">
    <input id="chatInput" type="text" placeholder="اكتب رسالتك..." style="flex:1; border:none; padding:10px; outline:none; border-radius:0 0 0 15px;">
    <button onclick="sendMsg()" style="background:#25D366; color:white; border:none; padding:10px 15px; border-radius:0 0 15px 0; cursor:pointer;">ارسال</button>
  </div>
</div>

<!-- زر فتح الشات -->
<button onclick="toggleChat()" style="position:fixed; bottom:20px; right:90px; background:#25D366; color:white; border:none; border-radius:50%; width:50px; height:50px; font-size:24px; cursor:pointer; z-index:9999;">💬</button>

<script>
function toggleChat(){
  const box = document.getElementById('chatbox');
  box.style.display = box.style.display === 'flex'? 'none' : 'flex';
  if(box.style.display === 'flex' && document.getElementById('chatMessages').innerHTML === '') {
    addMsg("مرحبا بيك في نورس! 💚 كيف نقدر نساعدك؟", 'bot');
  }
}

function addMsg(text, sender){
  const div = document.getElementById('chatMessages');
  div.innerHTML += `<div style="margin:5px 0; text-align:${sender==='bot'?'right':'left'}"><b>${sender==='bot'?'نورس:':'انت:'}</b> ${text}</div>`;
  div.scrollTop = div.scrollHeight;
}

function sendMsg(){
  const input = document.getElementById('chatInput');
  const msg = input.value.trim();
    if(!msg) return;
  addMsg(msg, 'user');
  input.value = '';
  setTimeout(()=> addMsg("شكرا على رسالتك! تواصل معانا واتساب 0910195360 ونردو عليك طول 💚", 'bot'), 500);
}
</script>
</body>
</html>
</body>
</html>
